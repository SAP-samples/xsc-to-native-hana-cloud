HELP_DESC_1=Create a new User record by providing First name, Last name and Email and then press "Create Record". This will send a HTTP POST request to the OData service to create a new record. The request will trigger "usersCreateMethod" procedure which performs a validation.
HELP_DESC_2=Create multiple User records using $batch request provided in OData. Check this link http://www.odata.org/documentation/odata-version-2-0/batch-processing/ 
HELP_DESC_3=This table is used to display all the User records. You can update any record by clicking any entry and then type the changes and then selecting any other object to trigger the update. You can also select a row and press Delete button to remove a record from the database. \n\n Here you can also add Credit card information by selecting a user, this is acheived using the XS Secure Store API. Check /sap/hana/democontent/epm/services/secureStore.xsjs for the implementation.         
HELP_DESC_4=Create multiple User records by uploading single or multiple XML files. The XML will be parsed using xsjs SAX XML Parser. On valid XML, it's saved into USR_XML_DATA table by using the asynchronous request completion feature.

