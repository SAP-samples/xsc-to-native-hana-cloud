---
  applications:
  - name: HCO_DEMOCONTENT-app
    host: [c/d/i-user]-HCO_DEMOCONTENT-app
    path: web
    memory: 128M
    services:
      - uaa
    env:
      destinations: >
        [
            {"name":"xsjs", "url": "http://[c/d/i-user]-HCO_DEMOCONTENT-xsjs-service.cfapps.neo.ondemand.com", "forwardAuthToken": true}
        ]

  - name: HCO_DEMOCONTENT-db
    path: db
    memory: 256M
    no-route: true
    services:
      - HCO_DEMOCONTENT-hdi
      - synonym-grantor-service
    env:
      TARGET_CONTAINER: HCO_DEMOCONTENT-hdi

  - name: HCO_DEMOCONTENT-xsjs-service
    host: [c/d/i-user]-HCO_DEMOCONTENT-xsjs-service
    path: async_xsjs
    memory: 128M
    services:
      - uaa
      - HCO_DEMOCONTENT-hdi

